const W = 160, H = 60, HGAP = 20, VGAP = 80;
let collapsed = new Set();
let allNodes = [];

function flatten(node, parent=null) {
  allNodes.push({...node, parent});
  if (node.children) node.children.forEach(c => flatten(c, node));
}
flatten(data);

function getVisible(node) {
  if (!node.children || collapsed.has(node.id)) return [node];
  return [node, ...node.children.flatMap(c => getVisible(c))];
}

function layout(node, depth=0, offset=0) {
  const visible = !collapsed.has(node.id);
  let childrenNodes = (visible && node.children) ? node.children : [];
  if (childrenNodes.length === 0) {
    node._x = offset;
    node._y = depth;
    node._width = 1;
    return 1;
  }
  let total = 0;
  childrenNodes.forEach(c => { total += layout(c, depth+1, offset+total); });
  node._width = total;
  node._x = offset + (total - 1) / 2;
  node._y = depth;
  return total;
}

function render() {
  layout(data);
  const svg = document.getElementById('tree');
  const leaves = countLeaves(data);
  const svgW = Math.max(680, leaves * (W + HGAP));
  const depth = maxDepth(data);
  const svgH = (depth + 1) * (H + VGAP) + 40;
  svg.setAttribute('width', svgW);
  svg.setAttribute('height', svgH);
  svg.innerHTML = '';

  drawEdges(data, svg, svgW);
  drawNodes(data, svg, svgW);
}

function px(node, svgW) {
  const leaves = countLeaves(data);
  const unit = svgW / Math.max(1, leaves);
  return node._x * unit + unit/2;
}

function py(node) { return node._y * (H + VGAP) + 20; }

function countLeaves(node) {
  if (!node.children || collapsed.has(node.id) || node.children.length===0) return 1;
  return node.children.reduce((s,c)=>s+countLeaves(c),0);
}

function maxDepth(node, d=0) {
  if (!node.children || collapsed.has(node.id)) return d;
  return Math.max(...node.children.map(c=>maxDepth(c,d+1)));
}

function drawEdges(node, svg, svgW) {
  if (!node.children || collapsed.has(node.id)) return;
  const x1 = px(node, svgW), y1 = py(node) + H;
  node.children.forEach(child => {
    const x2 = px(child, svgW), y2 = py(child);
    const mid = (y1+y2)/2;
    const path = document.createElementNS('http://www.w3.org/2000/svg','path');
    path.setAttribute('d',`M ${x1} ${y1} C ${x1} ${mid}, ${x2} ${mid}, ${x2} ${y2}`);
    path.setAttribute('fill','none');
    path.setAttribute('class','edge-path');
    path.setAttribute('stroke','#c4c4c8');
    path.setAttribute('stroke-width','1.75');
    svg.appendChild(path);
    drawEdges(child, svg, svgW);
  });
}

function drawNodes(node, svg, svgW) {
  const g = document.createElementNS('http://www.w3.org/2000/svg','g');
  g.setAttribute('class','node-card');
  g.setAttribute('id','node-'+node.id);
  g.setAttribute('data-id', node.id);
  g.style.cursor='pointer';

  const x = px(node, svgW) - W/2, y = py(node);
  const gen = node.gen || 0;
  const fill = genLight[gen] || '#F1EFE8';
  const stroke = genColors[gen] || '#534AB7';
  const textColor = genColors[gen] || '#534AB7';

  const rect = document.createElementNS('http://www.w3.org/2000/svg','rect');
  rect.setAttribute('x',x); rect.setAttribute('y',y);
  rect.setAttribute('width',W); rect.setAttribute('height',H);
  rect.setAttribute('rx','8'); rect.setAttribute('ry','8');
  rect.setAttribute('fill',fill);
  rect.setAttribute('stroke',stroke);
  rect.setAttribute('stroke-width','1.5');
  g.appendChild(rect);

  const hasKids = node.children && node.children.length > 0;
  const isCollapsed = collapsed.has(node.id);

  const nameParts = node.name.length > 22 ? [node.name.slice(0,22)+'\u2026'] : [node.name];
  const text = document.createElementNS('http://www.w3.org/2000/svg','text');
  text.setAttribute('x', x+W/2); text.setAttribute('y', y+H/2-(hasKids?4:0));
  text.setAttribute('text-anchor','middle'); text.setAttribute('dominant-baseline','middle');
  text.setAttribute('font-size','11.5'); text.setAttribute('font-weight','500');
  text.setAttribute('fill', textColor);
  text.textContent = nameParts[0];
  g.appendChild(text);

  if (hasKids) {
    const indicator = document.createElementNS('http://www.w3.org/2000/svg','text');
    indicator.setAttribute('x', x+W/2); indicator.setAttribute('y', y+H-10);
    indicator.setAttribute('text-anchor','middle');
    indicator.setAttribute('font-size','10'); indicator.setAttribute('fill', stroke);
    indicator.textContent = isCollapsed ? `▶ ${node.children.length} children` : `▼ ${node.children.length} children`;
    g.appendChild(indicator);
  }

  g.addEventListener('click', (e) => {
    e.stopPropagation();
    if (hasKids) {
      if (collapsed.has(node.id)) collapsed.delete(node.id);
      else collapsed.add(node.id);
      render();
    }
    openPanel(node);
  });

  svg.appendChild(g);
  if (node.children && !isCollapsed) node.children.forEach(c=>drawNodes(c,svg,svgW));
}

function openPanel(node) {
  document.getElementById('panel-name').textContent = node.name;
  document.getElementById('panel-sub').textContent = 'Generation ' + (node.gen+1);
  const details = document.getElementById('panel-details');
  const rows = [];
  if (node.note) rows.push(['Notes', node.note]);
  if (node.children) rows.push(['Children', node.children.map(c=>c.name).join(', ')]);
  const parent = allNodes.find(n=>n.id===node.id)?.parent;
  if (parent) rows.push(['Parent', parent.name]);
  details.innerHTML = rows.map(([l,v])=>`<div class="detail-row"><span class="detail-label">${l}</span><span style="color:var(--color-text-primary)">${v}</span></div>`).join('');
  document.getElementById('panel').classList.add('open');
}

function closePanel() { document.getElementById('panel').classList.remove('open'); }

function resetView() {
  collapsed = new Set(['G1C1','G1C2','G1C3','G1C4']);
  render();
}

function expandAll() { collapsed.clear(); render(); }
function collapseAll() {
  allNodes.forEach(n=>{ if(n.children&&n.children.length) collapsed.add(n.id); });
  render();
}

function searchTree(q) {
  document.querySelectorAll('.node-card').forEach(el=>el.classList.remove('highlight-match'));
  if (!q) return;
  const ql = q.toLowerCase();
  allNodes.forEach(n=>{
    if (n.name.toLowerCase().includes(ql)) {
      const el = document.getElementById('node-'+n.id);
      if (el) el.classList.add('highlight-match');
    }
  });
}

resetView();
